    <script>
      (function () {
        try {
          var theme = localStorage.getItem('theme-preference');
          if (theme === 'light' || theme === '"light"') {
            document.documentElement.classList.remove('dark');
            document.documentElement.classList.add('light');
          } else {
            document.documentElement.classList.add('dark');
            document.documentElement.classList.remove('light');
          }
        } catch (e) {}
      })();
    </script>
    <script>
      window.__MINDOS_BOOTSTRAP__ = (async function () {
        var SW_RESET_VERSION = '2026-03-25-v1';
        var SW_RESET_KEY = 'mindos-sw-reset-version';

        try {
          if (localStorage.getItem(SW_RESET_KEY) === SW_RESET_VERSION) return;
          localStorage.setItem(SW_RESET_KEY, SW_RESET_VERSION);

          if ('serviceWorker' in navigator) {
            var registrations = await navigator.serviceWorker.getRegistrations();
            await Promise.all(registrations.map(function (registration) {
              return registration.unregister();
            }));
          }

          if ('caches' in window) {
            var cacheNames = await caches.keys();
            await Promise.all(cacheNames.map(function (cacheName) {
              return caches.delete(cacheName);
            }));
          }
        } catch (e) {
          console.error('[Bootstrap] Failed to reset stale PWA state:', e);
        }
      })();
    </script>
