<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="auroraGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F4A6FF"/>
      <stop offset="35%" stop-color="#9B7CFF"/>
      <stop offset="65%" stop-color="#6FE3D6"/>
      <stop offset="100%" stop-color="#FFD27D"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g stroke="url(#auroraGradient)" stroke-width="10" stroke-linejoin="round" stroke-linecap="round" filter="url(#softGlow)">
